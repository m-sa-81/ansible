---

- name: "5.4.3.1 | PATCH | Ensure nologin is not listed in /etc/shells"
  when: ubtu24cis_rule_5_4_3_1
  tags:
    - level2-server
    - level2-workstation
    - patch
    - shells
    - rule_5.4.3.1
    - NIST800-53R5_CM-1
    - NIST800-53R5_CM-2
    - NIST800-53R5_CM-6
    - NIST800-53R5_CM-7
    - NIST800-53R5_IA-5
  ansible.builtin.replace:
    path: /etc/shells
    regexp: nologin
    replace: ""

- name: "5.4.3.2 | PATCH | Ensure default user shell timeout is configured"
  when: ubtu24cis_rule_5_4_3_2
  tags:
    - level1-server
    - level1-workstation
    - patch
    - shell
    - rule_5.4.3.2
    - NIST800-53R5_NA
  block:
    - name: "5.4.3.2 | AUDIT | Ensure default user shell timeout is configured | Get shell timeout files"
      ansible.builtin.stat:
        path: "{{ ubtu24cis_shell_session_file }}"
      register: discovered_shell_session_file

    - name: "5.4.3.2 | AUDIT | Ensure default user shell timeout is configured | Remove shell timeout files"
      when: discovered_shell_session_file.stat.exists
      ansible.builtin.replace:
        path: "{{ ubtu24cis_shell_session_file }}"
        regexp: '# Logout Timeout\nexport TMOUT=0\nreadonly TMOUT\n'
        replace: '# Logout Timeout\n'

    - name: "5.4.3.2 | PATCH | Ensure default user shell timeout is configured | Set shell timeout"
      ansible.builtin.blockinfile:
        path: "{{ item.path }}"
        state: "{{ item.state }}"
        marker: "# {mark} - CIS benchmark - Ansible-lockdown"
        create: true
        mode: 'u-x,go-wx'
        block: |
          TMOUT={{ ubtu24cis_shell_session_timeout }}
          readonly TMOUT
          export TMOUT
      loop:
        - { path: "{{ ubtu24cis_shell_session_file }}", state: present }
        - { path: /etc/profile, state: "{{ (ubtu24cis_shell_session_file == '/etc/profile') | ternary('present', 'absent') }}" }

- name: "5.4.3.3 | PATCH | Ensure default user umask is configured"
  when: ubtu24cis_rule_5_4_3_3
  tags:
    - level1-server
    - level1-workstation
    - patch
    - umask
    - rule_5.4.3.3
    - NIST800-53R5_AC-3
    - NIST800-53R5_MP-2
  block:
    - name: "5.4.3.3 | PATCH | Ensure default user umask is configured | update current settings"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: (?i)(umask\s+\d\d\d)
        replace: '{{ item.line }} {{ ubtu24cis_bash_umask }}'
      loop:
        - { path: '/etc/profile', line: 'umask' }
        - { path: '/etc/login.defs', line: 'UMASK' }

    - name: "5.4.3.3 | PATCH | Ensure default user umask is configured | add profile script to set"
      ansible.builtin.template:
        src: etc/profile.d/50-umask.sh.j2
        dest: /etc/profile.d/50-umask.sh
        owner: root
        group: root
        mode: 'go+r,go-wx'
